reconciled: true
tags:
  - FinOps
  - FOCUS
  - Observability
  - Session Replay
description: 'FOCUS-aligned FinOps for LogRocket: tiered subscription priced by monthly session capacity,
  with seats and retention as secondary cost drivers. Annual commitment on paid tiers; Enterprise adds
  conditional recording and self-hosted options.'
sources:
  - https://logrocket.com/pricing
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: LogRocket, Inc.
serviceCategory: Observability
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
    - Credit
focusColumns:
  ServiceName: LogRocket
  ServiceCategory: Observability
  ProviderName: LogRocket
  PublisherName: LogRocket, Inc.
  InvoiceIssuerName: LogRocket, Inc.
  BillingCurrency: USD
meters:
  - name: sessions
    unit: session
    aggregation: sum
    dimensions:
      - environment
      - app
  - name: seats
    unit: seat
    aggregation: max
    dimensions:
      - role
  - name: retention_months
    unit: month
    aggregation: max
  - name: subscription_fee
    unit: month
    aggregation: sum
    dimensions:
      - tier
principles:
  - name: Visibility
    description: Use the LogRocket Usage page and project dashboards to monitor session ingest vs. monthly
      capacity; set alerts before plan caps.
  - name: Allocation
    description: Tag sessions by app/environment via the JS SDK; map projects to internal team owners
      for chargeback.
  - name: Optimization
    description: Use Conditional Recording (Enterprise) to capture only impactful sessions; sample low-value
      flows; right-size retention.
  - name: Accountability
    description: Owners review monthly session burn vs. plan tier; renegotiate at renewal if forecasted
      sessions outgrow Team into Professional/Enterprise.
