naftiko: 1.0.0-alpha2
info:
  label: LogRocket REST API — Highlights
  description: 'LogRocket REST API — Highlights. 2 operations. Lead operation: Request Galileo AI session highlights. Self-contained
    Naftiko capability covering one Logrocket business surface.'
  tags:
  - Logrocket
  - Highlights
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    LOGROCKET_API_KEY: LOGROCKET_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-highlights
    baseUri: https://api.logrocket.com/v1
    description: LogRocket REST API — Highlights business capability. Self-contained, no shared references.
    resources:
    - name: orgs-orgId-apps-appId-highlights
      path: /orgs/{orgId}/apps/{appId}/highlights/
      operations:
      - name: createhighlights
        method: POST
        description: Request Galileo AI session highlights
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: gethighlights
        method: GET
        description: Retrieve Galileo AI session highlights
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: query
          type: string
          description: The request ID returned from the POST highlights endpoint.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.LOGROCKET_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: rest-highlights-rest
    port: 8080
    description: REST adapter for LogRocket REST API — Highlights. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/orgs/{orgid}/apps/{appid}/highlights
      name: orgs-orgid-apps-appid-highlights
      description: REST surface for orgs-orgId-apps-appId-highlights.
      operations:
      - method: POST
        name: createhighlights
        description: Request Galileo AI session highlights
        call: rest-highlights.createhighlights
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: gethighlights
        description: Retrieve Galileo AI session highlights
        call: rest-highlights.gethighlights
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-highlights-mcp
    port: 9090
    transport: http
    description: MCP adapter for LogRocket REST API — Highlights. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: request-galileo-ai-session-highlights
      description: Request Galileo AI session highlights
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-highlights.createhighlights
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: retrieve-galileo-ai-session-highlights
      description: Retrieve Galileo AI session highlights
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-highlights.gethighlights
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
